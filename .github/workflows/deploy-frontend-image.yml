name: Build & Push Sprocket Frontend Image

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-frontend-image.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: sprocket-frontend
  SNOWFLAKE_HOME: /tmp/snowflake-ci

jobs:
  # ── DEV ─────────────────────────────────────────────────────
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip3 install --upgrade snowflake-cli-labs

      - name: Configure Snowflake CLI
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          mkdir -p $SNOWFLAKE_HOME
          echo "$SNOWFLAKE_PRIVATE_KEY" > $SNOWFLAKE_HOME/rsa_key.p8
          chmod 0600 $SNOWFLAKE_HOME/rsa_key.p8
          cat > $SNOWFLAKE_HOME/config.toml <<EOF
          default_connection_name = "dev"

          [connections.dev]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "$SNOWFLAKE_HOME/rsa_key.p8"
          role = "$SNOWFLAKE_ROLE"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          EOF
          chmod 0600 $SNOWFLAKE_HOME/config.toml

      - name: Validate Snowflake connection
        run: snow connection test --connection dev

      - name: Login to image registry (dev)
        run: snow spcs image-registry login --connection dev

      - name: Build and push Docker image (dev)
        run: |
          REGISTRY="sfsenorthamerica-tporterawsdev.registry.snowflakecomputing.com"
          REPO="${REGISTRY}/sprocket_dev/app/sprocket_images"
          docker build \
            --platform linux/amd64 \
            -t "${REPO}/${{ env.IMAGE_NAME }}:dev" \
            -t "${REPO}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}" \
            .
          docker push "${REPO}/${{ env.IMAGE_NAME }}:dev"
          docker push "${REPO}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}"

      - name: Restart SPCS service (dev)
        run: |
          snow sql --query "ALTER SERVICE SPROCKET_DEV.APP.SPROCKET_FRONTEND_DEV FROM SPECIFICATION \$\$
          spec:
            containers:
              - name: sprocket-frontend
                image: /sprocket_dev/app/sprocket_images/sprocket-frontend:dev
                env:
                  SNOWFLAKE_WAREHOUSE: SPROCKET_WH
                  SNOWFLAKE_DATABASE: SPROCKET_DEV
                  SNOWFLAKE_SCHEMA: APP
                  AGENT_DB: SPROCKET_DEV
                  AGENT_SCHEMA: AGENT
                  AGENT_NAME: SPROCKET_AGENT_DEV
                  FRONTEND_DIST: /app/frontend/dist
                readinessProbe:
                  port: 3001
                  path: /health
            endpoints:
              - name: http
                port: 3001
                public: true
          capabilities:
            securityContext:
              executeAsCaller: true
          \$\$" --connection dev

      - name: Cleanup CI credentials
        if: always()
        run: rm -rf $SNOWFLAKE_HOME

      - name: Deployment summary (dev)
        if: success()
        run: |
          echo "✅ Sprocket frontend deployed to DEV!"
          echo "📍 Service: SPROCKET_DEV.APP.SPROCKET_FRONTEND_DEV"
          echo "🔖 SHA tag: dev-${{ github.sha }}"

  # ── PROD ────────────────────────────────────────────────────
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip3 install --upgrade snowflake-cli-labs

      - name: Configure Snowflake CLI
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          mkdir -p $SNOWFLAKE_HOME
          echo "$SNOWFLAKE_PRIVATE_KEY" > $SNOWFLAKE_HOME/rsa_key.p8
          chmod 0600 $SNOWFLAKE_HOME/rsa_key.p8
          cat > $SNOWFLAKE_HOME/config.toml <<EOF
          default_connection_name = "prod"

          [connections.prod]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "$SNOWFLAKE_HOME/rsa_key.p8"
          role = "$SNOWFLAKE_ROLE"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          EOF
          chmod 0600 $SNOWFLAKE_HOME/config.toml

      - name: Validate Snowflake connection
        run: snow connection test --connection prod

      - name: Login to image registry (prod)
        run: snow spcs image-registry login --connection prod

      - name: Build and push Docker image (prod)
        run: |
          REGISTRY="sfsenorthamerica-tporterawsdev.registry.snowflakecomputing.com"
          REPO="${REGISTRY}/sprocket/app/sprocket_images"
          docker build \
            --platform linux/amd64 \
            -t "${REPO}/${{ env.IMAGE_NAME }}:latest" \
            -t "${REPO}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            .
          docker push "${REPO}/${{ env.IMAGE_NAME }}:latest"
          docker push "${REPO}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Restart SPCS service (prod)
        run: |
          snow sql --query "ALTER SERVICE SPROCKET.APP.SPROCKET_FRONTEND FROM SPECIFICATION \$\$
          spec:
            containers:
              - name: sprocket-frontend
                image: /sprocket/app/sprocket_images/sprocket-frontend:latest
                env:
                  SNOWFLAKE_WAREHOUSE: SPROCKET_WH
                  SNOWFLAKE_DATABASE: SPROCKET
                  SNOWFLAKE_SCHEMA: APP
                  AGENT_DB: SPROCKET
                  AGENT_SCHEMA: AGENT
                  AGENT_NAME: SPROCKET_AGENT
                  FRONTEND_DIST: /app/frontend/dist
                readinessProbe:
                  port: 3001
                  path: /health
            endpoints:
              - name: http
                port: 3001
                public: true
          capabilities:
            securityContext:
              executeAsCaller: true
          \$\$" --connection prod

      - name: Cleanup CI credentials
        if: always()
        run: rm -rf $SNOWFLAKE_HOME

      - name: Deployment summary (prod)
        if: success()
        run: |
          echo "✅ Sprocket frontend deployed to PROD!"
          echo "📍 Service: SPROCKET.APP.SPROCKET_FRONTEND"
          echo "🔖 SHA tag: ${{ github.sha }}"
