name: Deploy Sprocket Agent to Snowflake

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'agents/**'
      - '.github/workflows/deploy-agent.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Snowflake CLI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-cli-labs

      - name: Create Snowflake CLI config
        shell: bash
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/rsa_key.p8
          chmod 0600 ~/.snowflake/rsa_key.p8
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "prod"

          [connections.prod]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "$HOME/.snowflake/rsa_key.p8"
          role = "$SNOWFLAKE_ROLE"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          database = "$SNOWFLAKE_DATABASE"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Validate Snowflake connection
        shell: bash
        run: snow connection test --connection prod

      - name: Deploy Sprocket Agent
        shell: bash
        run: snow sql -f agents/deploy_sprocket_agent.sql --variable AGENT_NAME=SPROCKET_AGENT_DEV --connection prod

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Sprocket Agent deployed successfully to DEV!"
          echo "📍 Agent: ${{ secrets.SNOWFLAKE_DATABASE }}.APP.SPROCKET_AGENT_DEV"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Snowflake CLI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-cli-labs

      - name: Create Snowflake CLI config
        shell: bash
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/rsa_key.p8
          chmod 0600 ~/.snowflake/rsa_key.p8
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "prod"

          [connections.prod]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "$HOME/.snowflake/rsa_key.p8"
          role = "$SNOWFLAKE_ROLE"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          database = "$SNOWFLAKE_DATABASE"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Validate Snowflake connection
        shell: bash
        run: snow connection test --connection prod

      - name: Deploy Sprocket Agent
        shell: bash
        run: snow sql -f agents/deploy_sprocket_agent.sql --variable AGENT_NAME=SPROCKET_AGENT --connection prod

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Sprocket Agent deployed successfully to PROD!"
          echo "📍 Agent: ${{ secrets.SNOWFLAKE_DATABASE }}.APP.SPROCKET_AGENT"
